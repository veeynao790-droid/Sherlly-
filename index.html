<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Slideshow for Sherlly</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        #background-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            object-fit: cover;
        }
        #slideshow {
            position: relative;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .slide {
            display: none;
            height: 100%;
            width: 100%;
            object-fit: cover;
        }
        .active {
            display: block;
        }
        #countdown {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 2em;
            color: white;
        }
        audio {
            display: none;
        }
    </style>
</head>
<body>

    <video id="background-video" autoplay muted loop>
        <source src="path_to_your_video.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <div id="slideshow">
        <img src="slide1.jpg" class="slide active">
        <img src="slide2.jpg" class="slide">
        <img src="slide3.jpg" class="slide">
    </div>

    <div id="countdown"></div>
    <audio id="background-music" autoplay loop>
        <source src="path_to_your_music.mp3" type="audio/mpeg">
        Your browser does not support the audio tag.
    </audio>

    <script>
        const slides = document.querySelectorAll('.slide');
        let currentSlide = 0;

        function showSlide(index) {
            slides.forEach((slide, i) => {
                slide.classList.remove('active');
                if (i === index) {
                    slide.classList.add('active');
                }
            });
        }

        function nextSlide() {
            currentSlide = (currentSlide + 1) % slides.length;
            showSlide(currentSlide);
        }

        setInterval(nextSlide, 3000);

        // Countdown timer
        const countdownDate = new Date("2026-04-09T00:00:00Z").getTime();
        const countdownElement = document.getElementById("countdown");

        setInterval(() => {
            const now = new Date().getTime();
            const distance = countdownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            countdownElement.innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;

            if (distance < 0) {
                clearInterval();
                countdownElement.innerHTML = "TIME UP!";
            }
        }, 1000);
    </script>
</body>
</html>
