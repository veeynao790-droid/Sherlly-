<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Design</title>
    <link rel="stylesheet" href="style.css">
    <script src="particles.js"></script>
</head>
<body>
    <video autoplay muted loop id="bg-video">
        <source src="Bg.mp4" type="video/mp4">
        Your browser does not support HTML5 video.
    </video>
    
    <div id="slideshow">
        <img src="foto1.JPG" alt="Photo 1">
        <img src="foto2.JPG" alt="Photo 2">
    </div>

    <audio autoplay loop>
        <source src="musik.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    
    <audio autoplay>
        <source src="voice.mp3" type="audio/mpeg">
    </audio>

    <div id="countdown"></div>
    
    <div id="particles-js"></div>
    
    <div class="typing-animation">
        <h1>Welcome to My Website!</h1>
    </div>

    <script>
        // Countdown Timer
        const countdownDate = new Date("May 2, 2026 00:00:00").getTime();
        const countdownFunction = setInterval(() => {
            const now = new Date().getTime();
            const distance = countdownDate - now;
            document.getElementById("countdown").innerHTML = distance < 0 ? "EXPIRED" : new Date(distance).toUTCString().slice(17, 25);
        }, 1000);
        
        // Particles Effect
        particlesJS.load('particles-js', 'particles.json', () => {});
    </script>
</body>
</html>
